<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiangning.</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap');
        
        :root {
            --bg: #0a0a0f;
            --primary: #122e8a;
            --accent: #f5efea;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: var(--bg);
            color: var(--accent);
            height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .bg {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 30%, rgba(18, 46, 138, 0.15) 0%, transparent 70%);
            z-index: 1;
            pointer-events: none;
        }
        
        .content {
            text-align: center;
            z-index: 2;
            padding: 2rem;
        }
        
        h1 {
            font-size: 5.8rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            margin-bottom: 0.8rem;
            background: linear-gradient(90deg, #f5efea, #a5b4fc, #122e8a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .subtitle {
            font-size: 1.15rem;
            opacity: 0.75;
            letter-spacing: 0.35em;
            margin-bottom: 4rem;
            font-weight: 300;
        }
        
        .stars {
            position: absolute;
            inset: 0;
            background: transparent url('https://s2.loli.net/2025/04/26/8vX7KzLqYpWjH9M.png') repeat;
            opacity: 0.12;
            animation: float 90s linear infinite;
            z-index: 0;
        }
        
        @keyframes float {
            0% { background-position: 0 0; }
            100% { background-position: -2500px -2500px; }
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <div class="bg"></div>
    
    <div class="content">
        <h1>Kiangning.</h1>
        <p class="subtitle">ANIME · DREAM · CODE</p>
    </div>

    <script>
        // 鼠标轻微跟随光晕效果
        document.addEventListener('mousemove', (e) => {
            const bg = document.querySelector('.bg');
            const x = (e.clientX / window.innerWidth) * 100;
            const y = (e.clientY / window.innerHeight) * 100;
            bg.style.background = `radial-gradient(circle at ${x}% ${y}%, rgba(18, 46, 138, 0.18) 0%, transparent 65%)`;
        });
    </script>
</body>
</html>
