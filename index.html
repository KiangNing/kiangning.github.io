<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiang</title>
    <style>
        :root {
            --bg: #f5efea;
            --ink: #122e8a;
        }

        body {
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 漫画边框容器 */
        .comic-frame {
            border: 6px solid var(--ink);
            padding: 40px 80px;
            background: white;
            box-shadow: 15px 15px 0 var(--ink);
            position: relative;
            transform: rotate(-1deg); /* 增加一点手绘的不安定感 */
        }

        /* 极简标题 */
        h1 {
            color: var(--ink);
            font-family: 'Arial Black', sans-serif;
            font-size: 80px;
            margin: 0;
            letter-spacing: -2px;
            text-transform: uppercase;
            position: relative;
        }

        /* 装饰性的对话尖角，模拟漫画格子 */
        .comic-frame::after {
            content: '';
            position: absolute;
            bottom: -20px;
            right: 40px;
            width: 40px;
            height: 40px;
            background: white;
            border-right: 6px solid var(--ink);
            border-bottom: 6px solid var(--ink);
            transform: rotate(45deg);
        }

        /* 极简网点纹理 */
        .halftone {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--ink) 1px, transparent 1px);
            background-size: 8px 8px;
            opacity: 0.1;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="comic-frame">
        <div class="halftone"></div>
        <h1>Kiang</h1>
    </div>

</body>
</html>
