<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiang - The Comic Page</title>
    <style>
        /* 定义配色变量 */
        :root {
            --bg-color: #f5efea; /* 米白 */
            --main-color: #122e8a; /* 深蓝 */
            --border-width: 4px;
        }

        /* 基础样式 */
        body {
            background-color: var(--bg-color);
            color: var(--main-color);
            font-family: 'Courier New', Courier, monospace; /* 使用具有打字机/手写感的字体 */
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 漫画格子容器 */
        .comic-container {
            width: 100%;
            max-width: 800px;
            border: var(--border-width) solid var(--main-color);
            background-color: white; /* 稍微提亮格子内部 */
            padding: 20px;
            box-shadow: 10px 10px 0 var(--main-color); /* 经典的漫画阴影 */
            position: relative;
        }

        /* 主标题 Kiang */
        .comic-title {
            font-size: 4rem;
            text-align: center;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            letter-spacing: 5px;
            -webkit-text-stroke: 2px var(--main-color); /* 文字描边 */
            color: var(--bg-color); /* 文字填充米白 */
            background-color: var(--main-color);
            padding: 10px;
            transform: rotate(-2deg); /* 稍微倾斜 */
            box-shadow: 5px 5px 0 rgba(18, 46, 138, 0.5);
        }

        /* 漫画面板网格 */
        .panel-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        @media (max-width: 600px) {
            .panel-grid {
                grid-template-columns: 1fr; /* 手机端单列 */
            }
        }

        /* 单个漫画格子 */
        .panel {
            border: calc(var(--border-width) - 1px) solid var(--main-color);
            padding: 15px;
            position: relative;
            overflow: hidden;
            background-color: white;
        }

        /* 模拟半调网点纹理 (Halftone) */
        .panel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: radial-gradient(var(--main-color) 1px, transparent 1px);
            background-size: calc(10px * 1) calc(10px * 1);
            opacity: 0.05; /* 非常淡的纹理 */
            z-index: 0;
        }

        .panel-content {
            position: relative;
            z-index: 1;
        }

        /* 漫画对白框风格 */
        .speech-bubble {
            background: white;
            border: 2px solid var(--main-color);
            border-radius: 10px;
            padding: 10px;
            margin-bottom: 15px;
            display: inline-block;
            font-weight: bold;
        }

        /* 衍生内容样式 */
        .panel-h3 {
            font-size: 1.5rem;
            margin-top: 0;
            border-bottom: 2px solid var(--main-color);
            padding-bottom: 5px;
        }

        .data-text {
            font-size: 0.9rem;
            line-height: 1.6;
        }

        .status {
            color: var(--bg-color);
            background-color: var(--main-color);
            padding: 2px 5px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <div class="comic-container">
        <h1 class="comic-title">Kiang</h1>

        <div class="panel-grid">
            <div class="panel">
                <div class="panel-content">
                    <div class="speech-bubble">
                        "探测到未知的网络波动..."
                    </div>
                    <div class="speech-bubble" style="margin-left: 20px;">
                        "来源：Kiang 的个人终端。"
                    </div>
                </div>
            </div>

            <div class="panel">
                <div class="panel-content">
                    <h3 class="panel-h3">档案：[已加密]</h3>
                    <p class="data-text">
                        <strong>代号:</strong> Kiang <br>
                        <strong>状态:</strong> <span class="status">ACTIVE</span> <br>
                        <strong>技能:</strong> 协议穿透, 静态架构, 域名放逐。<br>
                        <strong>备注:</strong> 极度安静，除非涉及到代码部署。
                    </p>
                </div>
            </div>

            <div class="panel" style="grid-column: span 2;">
                <div class="panel-content">
                    <h3 class="panel-h3">>_ 状态报告</h3>
                    <p class="data-text">
                        页面已在 GitHub Pages 成功部署。正在等待来自 Cloudflare 的进一步指令。目前未监测到任何动态后端的痕迹。这里非常安全。
                    </p>
                </div>
            </div>
             </div>
    </div>

</body>
</html>
